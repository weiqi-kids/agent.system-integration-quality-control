name: Security Scanner
# System Integration Quality Control - security & SEO scanning pipeline

on:
  workflow_dispatch:
    inputs:
      repos:
        description: 'GitHub repo URLs (JSON array, e.g. ["https://github.com/owner/repo"])'
        required: false
        type: string
      web_url:
        description: '上線網址 (for penetration testing & SEO scans)'
        required: false
        type: string
      scan_depth:
        description: '掃描深度'
        required: false
        type: choice
        options:
          - quick
          - standard
          - deep
        default: 'standard'
      project_name:
        description: '專案名稱 (optional, for grouping scan history)'
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

jobs:
  scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate inputs
        run: |
          REPOS='${{ inputs.repos }}'
          WEB_URL='${{ inputs.web_url }}'
          if [ -z "$REPOS" ] && [ -z "$WEB_URL" ]; then
            echo "Error: At least one of repos or web_url is required"
            exit 1
          fi
          if [ -n "$REPOS" ]; then
            echo "Validating repos JSON..."
            if ! echo "$REPOS" | jq -e . > /dev/null 2>&1; then
              echo "Error: repos input is not valid JSON"
              echo "Expected format: [\"https://github.com/owner/repo1\"]"
              exit 1
            fi
          fi
          echo "Input validation passed"

      - name: Make scripts executable
        run: chmod +x scripts/*.sh scripts/**/*.sh

      - name: Run security scans
        env:
          REPOS_JSON: ${{ inputs.repos }}
          WEB_URL: ${{ inputs.web_url }}
          SCAN_DEPTH: ${{ inputs.scan_depth }}
          PROJECT_NAME: ${{ inputs.project_name }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: ./scripts/entrypoint.sh

      - name: Upload scan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-reports
          path: docs/scans/
          retention-days: 30

      - name: Commit reports to main branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git commit -m "report: add scan $(ls -t docs/scans/ | head -1)" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin main

      - name: Post scan summary
        run: |
          SCAN_ID=$(ls -t docs/scans/ | head -1)
          REPO_NAME="${{ github.repository }}"
          PAGES_URL="https://${REPO_NAME%/*}.github.io/${REPO_NAME#*/}/scans/$SCAN_ID/"

          echo "## 🔒 Security Scan Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          PROJECT_NAME=$(jq -r '.project_name // "unknown"' docs/scans/$SCAN_ID/metadata.json 2>/dev/null || echo "unknown")
          echo "**Project**: \`$PROJECT_NAME\`" >> $GITHUB_STEP_SUMMARY
          echo "**Scan ID**: \`$SCAN_ID\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🌐 **[View Report]($PAGES_URL)**" >> $GITHUB_STEP_SUMMARY

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const reposRaw = '${{ inputs.repos }}';
            const repos = reposRaw ? JSON.parse(reposRaw) : [];
            const reposList = repos.length > 0 ? repos.map(r => `- ${r}`).join('\n') : 'None';
            const webUrl = '${{ inputs.web_url }}' || 'Not specified';
            const scanDepth = '${{ inputs.scan_depth }}';

            const body = [
              '## Security Scan Failed',
              '',
              '**Repositories scanned:**',
              reposList,
              '',
              `**Web URL:** ${webUrl}`,
              '',
              `**Scan Depth:** ${scanDepth}`,
              '',
              `**Run URL:** ${runUrl}`,
              '',
              'Please check the workflow logs for details.'
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Security scan failed - ${new Date().toISOString().split('T')[0]}`,
              body: body,
              labels: ['security', 'scan-failed']
            });
